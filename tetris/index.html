<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Tetris</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<!-- Fullscreen overlay for settings and click to start -->
<div id="overlay">
    <div id="settings-panel">
        <h1>TETRIS</h1>

        <label>
            Preset
            <select id="setting-preset-select"></select>
        </label>

        <label>
            Game Mode
            <select id="setting-game-mode">
                <option value="marathon">Marathon</option>
                <option value="sprint">Sprint</option>
                <option value="ultra">Ultra</option>
            </select>
        </label>

        <label>
            Gravity Table
            <select id="setting-gravity-table">
                <option value="standard">Standard</option>
                <option value="tgm2">TGM2 Like</option>
            </select>
        </label>

        <label>
            Starting Level
            <input id="setting-starting-level" type="number" min="1" value="1">
        </label>

        <label>
            Lines to Level Up
            <input id="setting-lines-per-level" type="number" min="1" value="10">
        </label>

        <label class="checkbox">
            <input id="setting-allow-hold" type="checkbox" checked>
            Allow Holds
        </label>

        <label class="checkbox">
            <input id="setting-allow-180" type="checkbox" checked>
            Allow 180° Rotation
        </label>

        <label class="checkbox">
            <input id="setting-level-on-lock" type="checkbox">
            Level Up on Piece Lock
        </label>

        <label class="checkbox">
            Pieces:
            <input id="setting-piece-basic" type="checkbox" checked>
            Tetrominoes
            <input id="setting-piece-pent" type="checkbox">
            Pentominos
        </label>

        <button id="start-button">Click to Start</button>
    </div>
</div>

<div class="wrapper">
    <div class="label">HELD</div>
    <canvas id="hold" width="150" height="150"></canvas>
    <div class="label" id="held-label"></div>
</div>
<div class="wrapper">
    <div class="label split">
        <div class="left" id="score-label">SCORE</div>
        <div class="right" id="high-score-label">HIGH SCORE</div>
    </div>
    <div class="label split">
        <div class="left" id="score-num-label">0</div>
        <div class="right" id="high-score-num-label">0</div>
    </div>

    <canvas id="game" width="300" height="600"></canvas>

    <div class="label split">
        <div class="left" id="level-label">LEVEL</div>
        <div class="middle" id="remaining-label">REMAINING</div>
        <div class="right" id="lines-label">LINES</div>
    </div>
    <div class="label split">
        <div class="left" id="level-num-label">0</div>
        <div class="middle" id="remaining-num-label">0</div>
        <div class="right" id="lines-num-label">0</div>
    </div>
</div>
<div class="wrapper">
    <div class="label">NEXT</div>
    <canvas id="next" width="150" height="150"></canvas>
    <div class="label" id="next-label">NEXT: ?</div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
