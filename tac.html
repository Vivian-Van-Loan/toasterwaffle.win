<html>
<head>
<meta charset="utf-8">
<title>Whatever, go my Tac Nayn</title>

<style>
    html {
        color-scheme: light dark;
    }
    body {
        width: 35em;
        margin: 0 auto;
        font-family: Tahoma, Verdana, Arial, sans-serif;
    }
    .center {
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
    }
    .waffle-base {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #efad31;
        height: calc(7% * 2);
        width: calc(6% * 2);
        
        border-style: solid;
        border-color: black;
        border-radius: 7%;
        border-width: thick;
        
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: space-evenly;
    }
    .waffle-spacer {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: space-evenly;
        height: 100%;
        width: 50%;
        
        margin: 1% 5%;
    }
    .waffle-hole {
        flex: 1 0 20%;
        margin: 1%;
        background-color: #cc6600;
        height: calc(10% * 2);
        width: calc(6% * 4);
        border-radius: 10%;
    }
</style>
</head>

<body>
    <div class="waffle-base">
        <div class="waffle-spacer">
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
        </div>
            
        <div class="waffle-spacer">
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
            <div class="waffle-hole"></div>
        </div>
        
    </div>
</body>
</html>
